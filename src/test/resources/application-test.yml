spring:
  datasource:
    url: jdbc:h2:mem:modev-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    generate-unique-name: true

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
        show_sql: false

  cloud:
    aws:
      s3:
        bucket: test-bucket
      region:
        static: ap-northeast-2
      credentials:
        access-key: test-access-key
        secret-key: test-secret-key

jwt:
  secret: test-jwt-secret-for-context-loads

ai:
  server:
    base-url: http://localhost:9999
    internal-api-key: test-ai-key
