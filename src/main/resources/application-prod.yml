spring:
  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        show_sql: false

# Server
server:
  port: 8080

# Logging
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{userId:-},%X{clientIp:-},%X{requestUri:-}] %logger{36} - %msg%n%nopex"
  level:
    root: WARN
    modeep.modev: INFO
    modeep.modev.global.exception.GlobalExceptionHandler: ERROR
