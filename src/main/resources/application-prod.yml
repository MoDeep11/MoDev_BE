spring:
  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        show_sql: false

# Server
server:
  port: 8080

# Logging
logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([%thread]){magenta} %clr(%-5level) %clr([%X{traceId:-},%X{userId:-},%X{clientIp:-},%X{requestUri:-}]){cyan} %clr(%logger{36}){blue} - %msg%n%nopex"
  level:
    root: WARN
    modeep.modev: INFO
    modeep.modev.global.exception.GlobalExceptionHandler: ERROR
