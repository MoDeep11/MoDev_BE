openapi: 3.0.3
info:
  title: API Specification - FEAT-1 프로젝트 구성
  description: |
    개발 분야(Field) 조회 / 기술 스택 조회 / 의존성 조회 API 명세서

    ### 인증 정책
    - 프로젝트 구성 플로우는 비로그인 사용자도 접근 가능하다.
    - 인증이 필요한 API는 `Authorization: Bearer {access_token}` 헤더를 포함해야 한다.
  version: 1.0.0

servers:
  - url: https://api.{serviceDomain}.com
    description: Production
    variables:
      serviceDomain:
        default: example.com

tags:
  - name: Catalog
    description: 프로젝트 구성 메타데이터 API (분야, 스택, 의존성 목록 조회)

paths:

  /catalog/fields:
    get:
      tags:
        - Catalog
      summary: 개발 분야 목록 조회
      description: |
        선택 가능한 개발 분야 전체 목록을 반환한다.
        분야 목록은 운영 DB 기반으로 관리되며 코드 배포 없이 추가/수정/비활성화가 가능하다.
        비로그인 사용자도 접근 가능하다.
      operationId: getFields
      security: []
      responses:
        '200':
          description: 분야 목록 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          fields:
                            type: array
                            items:
                              $ref: '#/components/schemas/Field'
              example:
                success: true
                data:
                  fields:
                    - fieldId: field_fe
                      name: Frontend
                      description: 웹 클라이언트 개발
                      iconUrl: https://cdn.example.com/icons/frontend.svg
                    - fieldId: field_be
                      name: Backend
                      description: 서버 및 API 개발
                      iconUrl: https://cdn.example.com/icons/backend.svg
                    - fieldId: field_devops
                      name: DevOps
                      description: 인프라, CI/CD, 컨테이너 관련
                      iconUrl: https://cdn.example.com/icons/devops.svg
                    - fieldId: field_ai
                      name: AI / ML
                      description: 머신러닝, 데이터 파이프라인 관련
                      iconUrl: https://cdn.example.com/icons/ai.svg
                error: null
        '500':
          $ref: '#/components/responses/InternalError'

  /catalog/stacks:
    get:
      tags:
        - Catalog
      summary: 기술 스택 목록 조회
      description: |
        선택된 개발 분야에 해당하는 기술 스택 목록을 반환한다.
        `fieldIds`로 필터링하며, `keyword`로 스택명 검색이 가능하다.
        비로그인 사용자도 접근 가능하다.
      operationId: getStacks
      security: []
      parameters:
        - in: query
          name: fieldIds
          required: true
          schema:
            type: string
          description: 분야 ID 목록 (콤마 구분)
          example: field_fe,field_be
        - in: query
          name: keyword
          required: false
          schema:
            type: string
          description: 스택명 검색 키워드
          example: spring
      responses:
        '200':
          description: 스택 목록 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          stacks:
                            type: array
                            items:
                              $ref: '#/components/schemas/Stack'
              example:
                success: true
                data:
                  stacks:
                    - stackId: stack_spring
                      fieldId: field_be
                      category: FRAMEWORK
                      name: Spring Boot
                      description: Java 기반 백엔드 프레임워크
                      iconUrl: https://cdn.example.com/icons/spring.svg
                    - stackId: stack_react
                      fieldId: field_fe
                      category: FRAMEWORK
                      name: React
                      description: 컴포넌트 기반 UI 라이브러리
                      iconUrl: https://cdn.example.com/icons/react.svg
                error: null
        '400':
          description: 필수 파라미터 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  code: VALIDATION_ERROR
                  message: fieldIds는 필수 파라미터입니다.
        '500':
          $ref: '#/components/responses/InternalError'

  /catalog/dependencies:
    get:
      tags:
        - Catalog
      summary: 의존성 목록 조회
      description: |
        선택된 기술 스택에 해당하는 의존성(라이브러리, 패키지) 목록을 반환한다.
        `stackIds`로 필터링하며, `keyword`로 의존성명 검색이 가능하다.
        비로그인 사용자도 접근 가능하다.
      operationId: getDependencies
      security: []
      parameters:
        - in: query
          name: stackIds
          required: true
          schema:
            type: string
          description: 스택 ID 목록 (콤마 구분)
          example: stack_spring,stack_react
        - in: query
          name: keyword
          required: false
          schema:
            type: string
          description: 의존성명 검색 키워드
          example: security
      responses:
        '200':
          description: 의존성 목록 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          dependencies:
                            type: array
                            items:
                              $ref: '#/components/schemas/Dependency'
              example:
                success: true
                data:
                  dependencies:
                    - dependencyId: dep_spring_security
                      stackId: stack_spring
                      name: Spring Security
                      version: 6.2.1
                      description: 인증/인가 처리 라이브러리
                      isRecommended: true
                      documentUrl: https://docs.spring.io/spring-security
                    - dependencyId: dep_jpa
                      stackId: stack_spring
                      name: Spring Data JPA
                      version: 3.2.1
                      description: JPA 기반 데이터 접근 라이브러리
                      isRecommended: true
                      documentUrl: https://docs.spring.io/spring-data/jpa
                error: null
        '400':
          description: 필수 파라미터 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  code: VALIDATION_ERROR
                  message: stackIds는 필수 파라미터입니다.
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: 인증 토큰 없음 또는 만료
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            data: null
            error:
              code: UNAUTHORIZED
              message: 인증이 필요합니다.
    InternalError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            data: null
            error:
              code: INTERNAL_ERROR
              message: 서버 내부 오류가 발생했습니다.

  schemas:

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          nullable: true
        error:
          nullable: true
          example: null

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          nullable: true
          example: null
        error:
          $ref: '#/components/schemas/ErrorDetail'

    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: 입력값이 올바르지 않습니다.

    Field:
      type: object
      properties:
        fieldId:
          type: string
          description: 분야 식별자 (publicId)
          example: field_fe
        name:
          type: string
          description: 분야명
          example: Frontend
        description:
          type: string
          description: 분야 설명
          example: 웹 클라이언트 개발
        iconUrl:
          type: string
          format: uri
          description: 분야 아이콘 URL
          example: https://cdn.example.com/icons/frontend.svg

    Stack:
      type: object
      properties:
        stackId:
          type: string
          description: 스택 식별자
          example: stack_spring
        fieldId:
          type: string
          description: 소속 분야 식별자 (publicId)
          example: field_be
        category:
          type: string
          description: 스택 카테고리
          enum: [LANGUAGE, FRAMEWORK, DATABASE, INFRA, TOOL]
          example: FRAMEWORK
        name:
          type: string
          description: 스택명
          example: Spring Boot
        description:
          type: string
          description: 스택 설명
          example: Java 기반 백엔드 프레임워크
        iconUrl:
          type: string
          format: uri
          description: 스택 아이콘 URL
          example: https://cdn.example.com/icons/spring.svg

    Dependency:
      type: object
      properties:
        dependencyId:
          type: string
          description: 의존성 식별자
          example: dep_spring_security
        stackId:
          type: string
          description: 소속 스택 식별자
          example: stack_spring
        name:
          type: string
          description: 의존성명
          example: Spring Security
        version:
          type: string
          description: 최신 안정화 버전
          example: 6.2.1
        description:
          type: string
          description: 의존성 설명
          example: 인증/인가 처리 라이브러리
        isRecommended:
          type: boolean
          description: 추천 의존성 여부
          example: true
        documentUrl:
          type: string
          format: uri
          description: 공식 문서 URL
          example: https://docs.spring.io/spring-security