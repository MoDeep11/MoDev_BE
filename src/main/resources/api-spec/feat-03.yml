openapi: 3.0.3
info:
  title: API Specification - FEAT-3 프로젝트 관리
  description: |
    프로젝트 저장 / 목록 조회 / 상세 조회 / 메타데이터 수정 / 스택 수정 / 삭제 / 내보내기 API 명세서

    ### 인증 정책
    - 모든 API는 로그인된 사용자만 접근 가능하다.
    - 프로젝트 저장(`POST /projects`)은 이메일 인증 완료가 추가로 필요하다.
    - 요청 헤더에 `Authorization: Bearer {access_token}` 을 포함해야 한다.

    ### 삭제 정책
    - 프로젝트 삭제는 소프트 삭제(Soft Delete)로 처리된다.
    - 삭제 후 30일이 지나면 배치 작업으로 영구 삭제(Hard Delete)된다.
    - 복구 기능은 제공하지 않는다.
    - 자세한 내용은 삭제 정책 문서(@POLICY-RESTORE-01)를 참고한다.
  version: 1.0.0

servers:
  - url: https://api.{serviceDomain}.com
    description: Production
    variables:
      serviceDomain:
        default: example.com

tags:
  - name: Projects
    description: 프로젝트 관리 API

paths:

  /projects:
    post:
      tags:
        - Projects
      summary: 프로젝트 저장
      description: |
        AI 생성 결과(`generateId`)를 계정에 저장하여 프로젝트를 생성한다.
        로그인 및 이메일 인증 완료가 필요하다.
      operationId: saveProject
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveProjectRequest'
            example:
              generateId: gen_abc123
              projectName: my-project
              description: Spring Boot + React 기반 풀스택 프로젝트
      responses:
        '201':
          description: 프로젝트 저장 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SaveProjectData'
              example:
                success: true
                data:
                  projectId: proj_xyz
                  projectName: my-project
                  createdAt: "2025-05-26T10:00:00Z"
                error: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 이메일 미인증
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  code: EMAIL_NOT_VERIFIED
                  message: 이메일 인증이 필요합니다.
        '404':
          description: 생성 ID 없음 또는 만료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  code: GENERATE_NOT_FOUND
                  message: 생성 결과를 찾을 수 없거나 만료되었습니다.
        '409':
          description: 프로젝트명 중복
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  code: PROJECT_NAME_DUPLICATE
                  message: 이미 사용 중인 프로젝트명입니다.

    get:
      tags:
        - Projects
      summary: 프로젝트 목록 조회
      description: |
        로그인된 사용자의 프로젝트 목록을 반환한다.
        기본 정렬은 최종 수정일 기준 내림차순이며, 페이지네이션을 적용한다.
      operationId: getProjects
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 1
          description: 페이지 번호
          example: 1
        - in: query
          name: size
          required: false
          schema:
            type: integer
            default: 20
          description: 페이지 크기
          example: 20
        - in: query
          name: keyword
          required: false
          schema:
            type: string
          description: 프로젝트명 또는 기술 스택 검색 키워드
          example: spring
      responses:
        '200':
          description: 목록 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProjectListData'
              example:
                success: true
                data:
                  projects:
                    - projectId: proj_xyz
                      projectName: my-project
                      description: Spring Boot + React 기반 풀스택 프로젝트
                      stacks:
                        - Spring Boot
                        - React
                        - MySQL
                      createdAt: "2025-05-26T10:00:00Z"
                      updatedAt: "2025-05-26T10:00:00Z"
                      status: ACTIVE
                  pagination:
                    currentPage: 1
                    totalPages: 3
                    totalCount: 42
                    size: 20
                error: null
        '401':
          $ref: '#/components/responses/Unauthorized'

  /projects/{projectId}:
    get:
      tags:
        - Projects
      summary: 프로젝트 상세 조회
      description: |
        특정 프로젝트의 상세 정보를 반환한다.
        본인 소유 프로젝트만 조회 가능하다.
      operationId: getProject
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 상세 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProjectDetailData'
              example:
                success: true
                data:
                  projectId: proj_xyz
                  projectName: my-project
                  description: Spring Boot + React 기반 풀스택 프로젝트
                  domains:
                    - Backend
                    - Frontend
                  stacks:
                    - stackId: stack_spring
                      name: Spring Boot
                      category: FRAMEWORK
                  dependencies:
                    - dependencyId: dep_spring_security
                      name: Spring Security
                      version: 6.2.1
                      stackId: stack_spring
                  fileTree:
                    - name: backend
                      type: DIRECTORY
                      children: []
                  createdAt: "2025-05-26T10:00:00Z"
                  updatedAt: "2025-05-26T10:00:00Z"
                error: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Projects
      summary: 프로젝트 삭제 (소프트 삭제)
      description: |
        프로젝트를 소프트 삭제 처리한다.
        삭제된 프로젝트는 목록에서 즉시 제거되며, 30일 후 배치 작업으로 영구 삭제된다.
        복구 기능은 제공하지 않는다.
      operationId: deleteProject
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 삭제 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DeleteProjectData'
              example:
                success: true
                data:
                  projectId: proj_xyz
                  deletedAt: "2025-05-26T11:00:00Z"
                  hardDeleteScheduledAt: "2025-06-25T11:00:00Z"
                error: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/metadata:
    patch:
      tags:
        - Projects
      summary: 프로젝트 메타데이터 수정
      description: |
        프로젝트명과 설명을 수정한다.
        메타데이터 수정은 AI 재생성을 트리거하지 않는다.
        프로젝트명 변경 시 zip 다운로드 파일명에도 반영된다.
      operationId: updateProjectMetadata
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMetadataRequest'
            example:
              projectName: new-project-name
              description: 수정된 프로젝트 설명
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UpdateMetadataData'
              example:
                success: true
                data:
                  projectId: proj_xyz
                  projectName: new-project-name
                  description: 수정된 프로젝트 설명
                  updatedAt: "2025-05-26T11:00:00Z"
                error: null
        '400':
          description: 입력값 유효성 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  code: VALIDATION_ERROR
                  message: 프로젝트명은 최대 50자까지 입력 가능합니다.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 프로젝트명 중복
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  code: PROJECT_NAME_DUPLICATE
                  message: 이미 사용 중인 프로젝트명입니다.

  /projects/{projectId}/stacks:
    patch:
      tags:
        - Projects
      summary: 프로젝트 기술 스택 수정 및 AI 재생성 요청
      description: |
        기술 스택과 의존성을 변경하고 AI 재생성을 요청한다.
        재생성은 비동기로 처리되며, 응답으로 받은 `generateId`로 상태를 폴링해야 한다.
        재생성 완료 후 미리보기 확인 없이 자동 저장되지 않는다.
        변경 이력(변경 전/후 스택 목록, 변경일시)이 기록된다.
      operationId: updateProjectStacks
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStacksRequest'
            example:
              stackIds:
                - stack_spring
                - stack_react
                - stack_redis
              dependencyIds:
                - dep_spring_security
                - dep_jpa
      responses:
        '202':
          description: 재생성 요청 접수 (비동기 처리)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UpdateStacksData'
              example:
                success: true
                data:
                  generateId: gen_def456
                  status: PENDING
                error: null
        '400':
          description: 지원하지 않는 스택 조합
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  code: INVALID_STACK_COMBINATION
                  message: 지원하지 않는 스택 조합입니다.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/download:
    post:
      tags:
        - Projects
      summary: 기존 프로젝트 zip 다운로드 URL 발급
      description: |
        저장된 프로젝트의 파일을 zip으로 압축한 후 다운로드 URL을 반환한다.
        내부적으로 FEAT-2의 `ProjectZipGenerator` 모듈을 공통으로 사용한다.
        URL은 presigned 방식으로 만료 시간이 있다.

        ### 파일명 규칙
        `{projectName}_{YYYYMMDD}.zip`
        프로젝트명에 특수문자가 포함된 경우 파일 시스템 안전 문자로 치환한다.
      operationId: downloadProject
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 다운로드 URL 발급 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DownloadData'
              example:
                success: true
                data:
                  downloadUrl: https://storage.example.com/my-project_20250526.zip?token=abc...
                  expiresAt: "2025-05-26T12:00:00Z"
                  fileName: my-project_20250526.zip
                error: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
      description: 프로젝트 식별자
      example: proj_xyz

  responses:
    Unauthorized:
      description: 인증 토큰 없음 또는 만료
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            data: null
            error:
              code: UNAUTHORIZED
              message: 인증이 필요합니다.
    Forbidden:
      description: 권한 없음 (타 사용자 프로젝트 접근)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            data: null
            error:
              code: FORBIDDEN
              message: 접근 권한이 없습니다.
    NotFound:
      description: 프로젝트 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            data: null
            error:
              code: NOT_FOUND
              message: 프로젝트를 찾을 수 없습니다.
    InternalError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            data: null
            error:
              code: INTERNAL_ERROR
              message: 서버 내부 오류가 발생했습니다.

  schemas:

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          nullable: true
        error:
          nullable: true
          example: null

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          nullable: true
          example: null
        error:
          $ref: '#/components/schemas/ErrorDetail'

    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: 입력값이 올바르지 않습니다.

    # Request Schemas
    SaveProjectRequest:
      type: object
      required:
        - generateId
        - projectName
      properties:
        generateId:
          type: string
          description: FEAT-2에서 생성된 generateId
          example: gen_abc123
        projectName:
          type: string
          description: 프로젝트명 (최대 50자, 특수문자 제한)
          example: my-project
        description:
          type: string
          description: 프로젝트 설명 (최대 500자)
          example: Spring Boot + React 기반 풀스택 프로젝트

    UpdateMetadataRequest:
      type: object
      properties:
        projectName:
          type: string
          description: 변경할 프로젝트명 (최대 50자, 특수문자 제한)
          example: new-project-name
        description:
          type: string
          description: 변경할 프로젝트 설명 (최대 500자)
          example: 수정된 프로젝트 설명

    UpdateStacksRequest:
      type: object
      required:
        - stackIds
      properties:
        stackIds:
          type: array
          items:
            type: string
          description: 변경할 기술 스택 ID 목록
          minItems: 1
          example: [stack_spring, stack_react, stack_redis]
        dependencyIds:
          type: array
          items:
            type: string
          description: 변경할 의존성 ID 목록 (선택 사항)
          example: [dep_spring_security, dep_jpa]

    # Response Data Schemas
    SaveProjectData:
      type: object
      properties:
        projectId:
          type: string
          example: proj_xyz
        projectName:
          type: string
          example: my-project
        createdAt:
          type: string
          format: date-time
          example: "2025-05-26T10:00:00Z"

    ProjectListData:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/ProjectSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'

    ProjectSummary:
      type: object
      properties:
        projectId:
          type: string
          example: proj_xyz
        projectName:
          type: string
          example: my-project
        description:
          type: string
          example: Spring Boot + React 기반 풀스택 프로젝트
        stacks:
          type: array
          items:
            type: string
          description: 주요 스택명 목록 (최대 3개 노출, 초과 시 +N 처리는 프론트엔드에서 담당)
          example: [Spring Boot, React, MySQL]
        createdAt:
          type: string
          format: date-time
          example: "2025-05-26T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-05-26T10:00:00Z"
        status:
          type: string
          enum: [ACTIVE, DELETED]
          example: ACTIVE

    ProjectDetailData:
      type: object
      properties:
        projectId:
          type: string
          example: proj_xyz
        projectName:
          type: string
          example: my-project
        description:
          type: string
          example: Spring Boot + React 기반 풀스택 프로젝트
        domains:
          type: array
          items:
            type: string
          example: [Backend, Frontend]
        stacks:
          type: array
          items:
            $ref: '#/components/schemas/StackSummary'
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/DependencySummary'
        fileTree:
          type: array
          items:
            $ref: '#/components/schemas/FileTreeNode'
        createdAt:
          type: string
          format: date-time
          example: "2025-05-26T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-05-26T10:00:00Z"

    UpdateMetadataData:
      type: object
      properties:
        projectId:
          type: string
          example: proj_xyz
        projectName:
          type: string
          example: new-project-name
        description:
          type: string
          example: 수정된 프로젝트 설명
        updatedAt:
          type: string
          format: date-time
          example: "2025-05-26T11:00:00Z"

    UpdateStacksData:
      type: object
      properties:
        generateId:
          type: string
          description: 재생성 요청 ID (상태 조회에 사용)
          example: gen_def456
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, FAILED]
          example: PENDING

    DeleteProjectData:
      type: object
      properties:
        projectId:
          type: string
          example: proj_xyz
        deletedAt:
          type: string
          format: date-time
          example: "2025-05-26T11:00:00Z"
        hardDeleteScheduledAt:
          type: string
          format: date-time
          description: 영구 삭제 예정 일시 (소프트 삭제 후 30일)
          example: "2025-06-25T11:00:00Z"

    DownloadData:
      type: object
      properties:
        downloadUrl:
          type: string
          format: uri
          description: presigned 다운로드 URL
          example: https://storage.example.com/my-project_20250526.zip?token=abc...
        expiresAt:
          type: string
          format: date-time
          description: URL 만료 일시 (ISO 8601)
