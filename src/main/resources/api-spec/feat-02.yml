openapi: 3.0.3
info:
  title: API Specification - FEAT-2 프로젝트 구조 생성
  description: |
    AI 기반 프로젝트 구조 생성 / 생성 상태 조회 / SSE 스트리밍 / 파일 내용 조회 / zip 다운로드 API 명세서

    ### 생성 플로우
    1. `POST /projects/structures` 로 생성 요청 → `projectId` 반환
    2. `GET /projects/structures/{projectId}/stream` 으로 SSE 연결 → 실시간 파일 트리 수신
    3. `GET /projects/structures/{projectId}/files/{filePath}` 로 파일 내용 미리보기
    4. `POST /projects/structures/{projectId}/download` 로 zip 다운로드 URL 발급

    ### 인증 정책
    - 구조 생성 및 미리보기는 비로그인 사용자도 가능하다.
    - 생성 결과를 계정에 저장하려면 FEAT-3의 `POST /projects` 를 사용한다. (로그인 필요)
  version: 1.1.0

servers:
  - url: https://api.{serviceDomain}.com
    description: Production
    variables:
      serviceDomain:
        default: example.com

tags:
  - name: Generate
    description: 프로젝트 구조 AI 생성 API

paths:

  /projects/structures:
    post:
      tags:
        - Generate
      summary: 프로젝트 구조 AI 생성 요청
      description: |
        선택된 스택과 의존성을 기반으로 AI가 프로젝트 구조와 기초 설정 파일을 생성한다.
        생성은 비동기로 처리되며, 응답으로 받은 `projectId`로 SSE 스트리밍에 연결한다.
        비로그인 사용자도 요청 가능하다.

        ### 생성 결과물 예시
        - 디렉토리: `/frontend`, `/backend`, `/docker`, `/docs`
        - 파일: `README.md`, `.gitignore`, `docker-compose.yml`, `.env.example`, `build.gradle` 등
      operationId: generateProject
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
            example:
              projectId: proj_abc123
      responses:
        '202':
          description: 생성 요청 접수 (비동기 처리)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GenerateAcceptedData'
              example:
                success: true
                data:
                  projectId: proj_abc123
                  status: PENDING
                error: null
        '404':
          description: 프로젝트를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  code: PROJECT_NOT_FOUND
                  message: 해당 ID의 프로젝트를 찾을 수 없습니다.
        '500':
          $ref: '#/components/responses/InternalError'

  /projects/structures/{projectId}:
    get:
      tags:
        - Generate
      summary: 프로젝트 구조 생성 상태 조회
      description: |
        생성 요청의 현재 상태와 완료 시 파일 트리 결과를 반환한다.
        비로그인 사용자도 접근 가능하다.

        ### status 값
        | 값 | 설명 |
        |---|---|
        | `PENDING` | 생성 대기 중 |
        | `IN_PROGRESS` | 생성 중 |
        | `COMPLETED` | 생성 완료 |
        | `FAILED` | 생성 실패 |
      operationId: getGenerateStatus
      security: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 상태 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GenerateStatusData'
              examples:
                pending:
                  summary: 생성 대기 중
                  value:
                    success: true
                    data:
                      projectId: proj_abc123
                      status: PENDING
                      result: null
                    error: null
                completed:
                  summary: 생성 완료
                  value:
                    success: true
                    data:
                      projectId: proj_abc123
                      status: COMPLETED
                      result:
                        fileTree:
                          - name: backend
                            type: DIRECTORY
                            children:
                              - name: src
                                type: DIRECTORY
                                children:
                                  - name: main
                                    type: DIRECTORY
                                    children:
                                      - name: java
                                        type: DIRECTORY
                                        children: []
                                      - name: resources
                                        type: DIRECTORY
                                        children:
                                          - name: application.yml
                                            type: FILE
                                            children: []
                          - name: build.gradle
                            type: FILE
                            children: []
                          - name: README.md
                            type: FILE
                            children: []
                    error: null
                failed:
                  summary: 생성 실패
                  value:
                    success: true
                    data:
                      projectId: proj_abc123
                      status: FAILED
                      result: null
                    error: null
        '404':
          description: 프로젝트 ID 없음 또는 만료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  code: NOT_FOUND
                  message: 생성 결과를 찾을 수 없습니다.

  /projects/structures/{projectId}/stream:
    get:
      tags:
        - Generate
      summary: SSE 스트리밍 연결
      description: |
        생성 진행 상태를 SSE(Server-Sent Events)로 실시간 수신한다.
        클라이언트는 이벤트를 순차적으로 수신하여 파일 트리를 점진적으로 렌더링한다.
        비로그인 사용자도 접근 가능하다.

        ### 이벤트 타입
        | 이벤트 | 설명 |
        |---|---|
        | `connected` | SSE 연결 수립 완료 |
        | `progress` | 생성 진행 상태 안내 메시지 |
        | `file_created` | 파일 또는 디렉토리 생성 완료 |
        | `complete` | 전체 생성 완료 |
        | `error` | 생성 실패 |

        ### 이벤트 흐름 예시
        ```
        event: connected
        event: progress     (analyzing)
        event: progress     (generating)
        event: file_created (directory: src/)
        event: file_created (file: Application.java)
        ...
        event: complete
        ```
      operationId: streamGenerateStatus
      security: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: SSE 스트림
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                connected:
                  summary: 연결 수립
                  value: |
                    event: connected
                    data: {"projectId": "proj_abc123", "message": "연결되었습니다. 생성을 시작합니다."}
                progress:
                  summary: 진행 상태
                  value: |
                    event: progress
                    data: {"step": "analyzing", "message": "선택된 스택을 분석 중입니다..."}
                file_created:
                  summary: 파일 생성
                  value: |
                    event: file_created
                    data: {"type": "file", "path": "src/main/java/Application.java", "depth": 3, "content": "..."}
                complete:
                  summary: 생성 완료
                  value: |
                    event: complete
                    data: {"projectId": "proj_abc123", "totalFiles": 12, "totalDirectories": 6, "message": "프로젝트 구조 생성이 완료되었습니다."}
                error:
                  summary: 생성 실패
                  value: |
                    event: error
                    data: {"code": "GENERATION_FAILED", "message": "AI 구조 생성에 실패했습니다. 다시 시도해 주세요."}

  /projects/structures/{projectId}/files/{filePath}:
    get:
      tags:
        - Generate
      summary: 생성된 특정 파일 내용 조회
      description: |
        생성된 프로젝트의 특정 파일 내용을 반환한다.
        `filePath`는 프로젝트 루트 기준 상대 경로를 사용한다.
        비로그인 사용자도 접근 가능하다.
      operationId: getGeneratedFileContent
      security: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - in: path
          name: filePath
          required: true
          schema:
            type: string
          description: 파일 경로 (프로젝트 루트 기준 상대 경로)
          example: backend/build.gradle
      responses:
        '200':
          description: 파일 내용 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FileContentData'
              example:
                success: true
                data:
                  filePath: backend/build.gradle
                  content: "plugins {\n    id 'java'\n    id 'org.springframework.boot' version '3.2.1'\n}\n\ndependencies {\n    implementation 'org.springframework.boot:spring-boot-starter-web'\n}"
                  language: groovy
                error: null
        '404':
          description: 프로젝트 ID 또는 파일 경로 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  code: NOT_FOUND
                  message: 파일을 찾을 수 없습니다.

  /projects/structures/{projectId}/download:
    post:
      tags:
        - Generate
      summary: 생성된 프로젝트 zip 다운로드 URL 발급
      description: |
        생성된 프로젝트 전체를 zip으로 압축한 후 다운로드 URL을 반환한다.
        URL은 presigned 방식으로 만료 시간이 있으며, 직접 URL 노출을 방지한다. (@NFR-SEC-03)
        비로그인 사용자도 접근 가능하다.

        ### 파일명 규칙
        `{projectName}_{YYYYMMDD}.zip`
        프로젝트명에 특수문자가 포함된 경우 파일 시스템 안전 문자로 치환한다.
      operationId: downloadGeneratedProject
      security: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: 다운로드 URL 발급 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DownloadData'
              example:
                success: true
                data:
                  downloadUrl: https://storage.example.com/my-project_20250526.zip?token=abc...
                  expiresAt: "2025-05-26T11:00:00Z"
                  fileName: my-project_20250526.zip
                error: null
        '404':
          description: 프로젝트 ID 없음 또는 만료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                error:
                  code: NOT_FOUND
                  message: 생성 결과를 찾을 수 없습니다.
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
      description: 프로젝트 생성 ID
      example: proj_abc123

  responses:
    InternalError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            data: null
            error:
              code: INTERNAL_ERROR
              message: 서버 내부 오류가 발생했습니다.

  schemas:

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          nullable: true
        error:
          nullable: true
          example: null

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          nullable: true
          example: null
        error:
          $ref: '#/components/schemas/ErrorDetail'

    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: 입력값이 올바르지 않습니다.

    GenerateRequest:
      type: object
      required:
        - projectId
      properties:
        projectId:
          type: string
          description: 프로젝트 ID
          example: proj_abc123
    GenerateAcceptedData:
      type: object
      properties:
        projectId:
          type: string
          description: 프로젝트 생성 ID (상태 조회, SSE 연결, 다운로드에 사용)
          example: proj_abc123
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, FAILED]
          example: PENDING

    GenerateStatusData:
      type: object
      properties:
        projectId:
          type: string
          example: proj_abc123
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, FAILED]
          example: COMPLETED
        result:
          nullable: true
          description: status가 COMPLETED일 때만 값이 존재한다.
          type: object
          properties:
            fileTree:
              type: array
              items:
                $ref: '#/components/schemas/FileTreeNode'

    FileTreeNode:
      type: object
      properties:
        name:
          type: string
          description: 파일 또는 디렉토리 이름
          example: backend
        type:
          type: string
          enum: [FILE, DIRECTORY]
          example: DIRECTORY
        children:
          type: array
          items:
            $ref: '#/components/schemas/FileTreeNode'
          description: 하위 항목 (DIRECTORY인 경우)

    FileContentData:
      type: object
      properties:
        filePath:
          type: string
          description: 파일 경로
          example: backend/build.gradle
        content:
          type: string
          description: 파일 내용
          example: "plugins {\n    id 'java'\n}"
        language:
          type: string
          description: 신택스 하이라이팅을 위한 언어 식별자
          example: groovy

    DownloadData:
      type: object
      properties:
        downloadUrl:
          type: string
          format: uri
          description: presigned 다운로드 URL
          example: https://storage.example.com/my-project_20250526.zip?token=abc...
        expiresAt:
          type: string
          format: date-time
          description: URL 만료 일시 (ISO 8601)
          example: "2025-05-26T11:00:00Z"
        fileName:
          type: string
          description: 다운로드 파일명
          example: my-project_20250526.zip