spring:
  config:
    import: optional:file:.env[.properties]

  # Database
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Mail
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    sender:
      address: ${MAIL_FROM_ADDRESS:${MAIL_USERNAME:}}
      name: ${MAIL_FROM_NAME:MoDev}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          starttls:
            enable: true

  # Messages (i18n)
  messages:
    basename: messages
    encoding: UTF-8
    cache-duration: 3600

  # AWS S3
  cloud:
    aws:
      s3:
        bucket: ${AWS_S3_BUCKET}
      region:
        static: ${AWS_REGION}
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}

# Server
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

# JWT
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}      # 1시간
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:1209600000} # 14일

# AI Server
ai:
  server:
    base-url: ${AI_SERVER_BASE_URL}
    internal-api-key: ${AI_SERVER_INTERNAL_API_KEY}
    timeout:
      connect: 5000
      read: 35000

stream:
  structure:
    timeout-millis: 600000 # 10분
    heartbeat-interval-millis: 30000 # 30초

catalog:
  registry:
    sync:
      enabled: ${CATALOG_REGISTRY_SYNC_ENABLED:true}
      cron: ${CATALOG_REGISTRY_SYNC_CRON:0 0 3 * * *}
      timeout-millis: ${CATALOG_REGISTRY_SYNC_TIMEOUT_MILLIS:5000}
      github-token: ${GITHUB_TOKEN:}

# Springdoc (비활성화)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Logging
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{userId:-},%X{clientIp:-},%X{requestUri:-}] %logger{36} - %msg%n"
  level:
    root: INFO
