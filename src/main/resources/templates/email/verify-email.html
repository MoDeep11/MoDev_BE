<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>이메일 인증</title>
</head>
<body style="margin:0; padding:0; background-color:#0F0F14; font-family:Arial, sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0F0F14; padding:40px 0;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0" style="background-color:#1A1A24; border-radius:12px; padding:40px;">
                <tr>
                    <td>
                        <h1 style="margin:0 0 20px; font-size:24px; color:#EEEEFF;">
                            MoDev 이메일 인증
                        </h1>

                        <p style="margin:0 0 16px; font-size:16px; color:#EEEEFF; line-height:1.6;">
                            안녕하세요.
                        </p>

                        <p style="margin:0 0 24px; font-size:16px; color:#EEEEFF; line-height:1.6;">
                            회원가입을 완료하려면 아래 버튼을 눌러 이메일 인증을 진행해주세요.
                        </p>

                        <table cellpadding="0" cellspacing="0" style="margin:32px 0;">
                            <tr>
                                <td align="center" style="background-color:#0EE5A1; border-radius:8px;">
                                    <a href="{{VERIFY_URL}}"
                                       target="_blank"
                                       style="display:inline-block; padding:14px 28px; color:#0F0F14; text-decoration:none; font-size:16px; font-weight:bold;">
                                        이메일 인증하기
                                    </a>
                                </td>
                            </tr>
                        </table>

                        <p style="margin:0 0 12px; font-size:14px; color:#606075; line-height:1.6;">
                            버튼이 동작하지 않으면 아래 링크를 브라우저에 복사해 열어주세요.
                        </p>

                        <p style="margin:0 0 24px; font-size:14px; color:#2563eb; line-height:1.6; word-break:break-all;">
                            <a href="{{VERIFY_URL}}" target="_blank" style="color:#2563eb;">
                                {{VERIFY_URL}}
                            </a>
                        </p>

                        <hr style="border:none; border-top:1px solid #9898BB; margin:32px 0;" />

                        <p style="margin:0; font-size:13px; color:#606075; line-height:1.6;">
                            본인이 요청하지 않은 메일이라면 이 메일을 무시하셔도 됩니다.
                        </p>

                        <p style="margin:8px 0 0; font-size:13px; color:#606075; line-height:1.6;">
                            인증 링크는 일정 시간이 지나면 만료될 수 있습니다.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
